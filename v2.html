<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Shanghai Trip Planner</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f1a;
    color: #e0e0e0;
    overflow-x: hidden;
  }

  .header {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    padding: 16px 20px;
    text-align: center;
    border-bottom: 1px solid #2a2a4a;
    position: sticky;
    top: 0;
    z-index: 1000;
  }
  .header h1 { font-size: 20px; color: #fff; letter-spacing: 1px; }
  .header .dates { font-size: 12px; color: #888; margin-top: 4px; }

  .day-tabs {
    display: flex;
    overflow-x: auto;
    background: #1a1a2e;
    border-bottom: 1px solid #2a2a4a;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .day-tabs::-webkit-scrollbar { display: none; }
  .day-tab {
    flex: 0 0 auto;
    padding: 12px 16px;
    font-size: 13px;
    color: #888;
    border: none;
    background: none;
    cursor: pointer;
    white-space: nowrap;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .day-tab.active { color: #64b5f6; border-bottom-color: #64b5f6; }
  .day-tab .tab-date { display: block; font-size: 10px; color: #666; margin-top: 2px; }

  #map { width: 100%; height: 42vh; min-height: 260px; }

  .schedule-container { padding: 16px; }
  .day-title { font-size: 16px; font-weight: 700; color: #64b5f6; margin-bottom: 4px; }
  .day-subtitle { font-size: 12px; color: #666; margin-bottom: 16px; }

  .timeline { position: relative; padding-left: 28px; }
  .timeline::before {
    content: '';
    position: absolute;
    left: 10px; top: 8px; bottom: 8px;
    width: 2px;
    background: #2a2a4a;
  }

  .stop {
    position: relative;
    margin-bottom: 14px;
    background: #1a1a2e;
    border-radius: 12px;
    padding: 12px 14px;
    border: 1px solid #2a2a4a;
  }
  .stop::before {
    content: attr(data-num);
    position: absolute;
    left: -28px; top: 12px;
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
    z-index: 1;
    color: #0f0f1a;
  }
  .stop.hotel::before { background: #ff8a65; }
  .stop.food::before { background: #81c784; }
  .stop.attraction::before { background: #64b5f6; }
  .stop.transport::before { background: #ba68c8; }
  .stop.cruise::before { background: #4dd0e1; }

  .stop-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 4px;
  }
  .stop-name { font-size: 14px; font-weight: 600; color: #fff; }
  .stop-name .cn-name { font-size: 11px; color: #888; font-weight: 400; margin-left: 6px; }
  .stop-time { font-size: 12px; color: #64b5f6; white-space: nowrap; margin-left: 8px; }
  .stop-desc { font-size: 13px; color: #aaa; line-height: 1.5; }
  .stop-tip {
    margin-top: 6px;
    font-size: 12px;
    color: #ffd54f;
    background: rgba(255,213,79,0.08);
    padding: 5px 10px;
    border-radius: 6px;
  }

  .travel-info {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 4px 0;
    margin-bottom: 8px;
    font-size: 12px;
    color: #666;
  }

  .legend {
    display: flex;
    gap: 12px;
    padding: 8px 20px;
    font-size: 11px;
    color: #888;
    flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

  .hotel-summary {
    margin: 0 0 14px;
    padding: 12px 14px;
    background: linear-gradient(135deg, #2a1a1a, #1a1a2e);
    border-radius: 12px;
    border: 1px solid #3a2a2a;
  }
  .hotel-summary h3 { font-size: 13px; color: #ff8a65; margin-bottom: 4px; }
  .hotel-summary p { font-size: 13px; color: #ccc; line-height: 1.6; }

  .custom-marker { background: none; border: none; }
  .marker-pin {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 12px; font-weight: 700;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    border: 2px solid #fff;
  }

  .overview-card {
    background: #1a1a2e;
    border-radius: 12px;
    padding: 14px;
    border: 1px solid #2a2a4a;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .overview-card:active { border-color: #64b5f6; }
  .overview-card .ov-day { font-size: 14px; font-weight: 600; color: #64b5f6; }
  .overview-card .ov-desc { font-size: 13px; color: #aaa; margin-top: 4px; line-height: 1.4; }
  .overview-card .ov-spots {
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px;
  }
  .spot-tag {
    font-size: 11px; padding: 3px 8px; border-radius: 10px;
    background: rgba(100,181,246,0.12); color: #64b5f6;
  }
  .spot-tag.food { background: rgba(129,199,132,0.12); color: #81c784; }
  .spot-tag.hotel { background: rgba(255,138,101,0.12); color: #ff8a65; }
</style>
</head>

// ===== MAP =====
const map = L.map('map', {
  zoomControl: false,
  attributionControl: false
}).setView([31.20, 121.50], 11);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 18
}).addTo(map);

L.control.zoom({ position: 'topright' }).addTo(map);

const typeColors = {
  hotel: '#ff8a65',
  attraction: '#64b5f6',
  food: '#81c784',
  transport: '#ba68c8',
  cruise: '#4dd0e1'
};

let currentMarkers = [];
let currentLines = [];

function clearMap() {
  currentMarkers.forEach(m => map.removeLayer(m));
  currentLines.forEach(l => map.removeLayer(l));
  currentMarkers = [];
  currentLines = [];
}

function createMarkerIcon(num, type) {
  const color = typeColors[type] || '#64b5f6';
  return L.divIcon({
    className: 'custom-marker',
    html: '<div class="marker-pin" style="background:' + color + '">' + num + '</div>',
    iconSize: [28, 28],
    iconAnchor: [14, 14]
  });
}

function showDay(dayIndex) {
  clearMap();
  const day = DAYS[dayIndex];
  const bounds = [];
  const seen = new Set();

  day.places.forEach((key, i) => {
    if (seen.has(key)) return;
    seen.add(key);
    const p = PLACES[key];
    const marker = L.marker([p.lat, p.lng], {
      icon: createMarkerIcon(seen.size, p.type)
    }).addTo(map);
    marker.bindPopup('<b>' + p.name + '</b><br>' + p.cnName + '<br><small>' + p.desc + '</small>');
    currentMarkers.push(marker);
    bounds.push([p.lat, p.lng]);
  });

  if (day.places.length > 1 && dayIndex > 0) {
    const uniquePlaces = [...new Set(day.places)];
    const coords = uniquePlaces.map(k => [PLACES[k].lat, PLACES[k].lng]);
    const line = L.polyline(coords, {
      color: '#64b5f6',
      weight: 2,
      opacity: 0.5,
      dashArray: '6,8'
    }).addTo(map);
    currentLines.push(line);
  }

  if (bounds.length > 0) {
    map.fitBounds(bounds, { padding: [40, 40], maxZoom: 14 });
  }
}

// ===== RENDER =====
function renderDay(dayIndex) {
  const day = DAYS[dayIndex];
  let html = '<div class="schedule-container">';
  html += '<div class="day-title">' + day.title + '</div>';
  html += '<div class="day-subtitle">' + day.subtitle + '</div>';

  if (day.hotel) {
    html += '<div class="hotel-summary"><h3>숙소</h3><p>' + day.hotel + '</p></div>';
  }

  if (dayIndex === 0) {
    html += '<div class="hotel-summary"><h3>숙소 정보</h3>';
    html += '<p>3/25~26 (2박): 노보텔 클로버 (푸동, 디즈니 인근)<br>';
    html += '3/27~28 (2박): 그랜드 센트럴 호텔 (푸시, 난징루 인근)</p></div>';

    html += '<div class="hotel-summary"><h3>입출국</h3>';
    html += '<p>IN: 3/25 홍차오 공항(虹桥) 23:00 도착<br>';
    html += 'OUT: 3/29 푸동 공항(浦东) 10:00 출발</p></div>';

    DAYS.slice(1).forEach(function(d, i) {
      const dayPlaces = [...new Set(d.places)].filter(function(k) {
        return PLACES[k].type !== 'hotel';
      });
      html += '<div class="overview-card" onclick="selectDay(' + (i+1) + ')">';
      html += '<div class="ov-day">' + d.title + '</div>';
      html += '<div class="ov-desc">' + d.subtitle + '</div>';
      html += '<div class="ov-spots">';
      dayPlaces.forEach(function(k) {
        const p = PLACES[k];
        var tagClass = 'spot-tag';
        if (p.type === 'food') tagClass += ' food';
        html += '<span class="' + tagClass + '">' + p.name + '</span>';
      });
      html += '</div></div>';
    });
  } else {
    html += '<div class="timeline">';
    day.stops.forEach(function(stop, i) {
      var p = PLACES[stop.place];
      var travel = day.travels && day.travels[i] ? day.travels[i] : null;

      html += '<div class="stop ' + p.type + '" data-num="' + (i+1) + '">';
      html += '<div class="stop-header">';
      html += '<div class="stop-name">' + p.name + '<span class="cn-name">' + p.cnName + '</span></div>';
      html += '<div class="stop-time">' + stop.time + '</div>';
      html += '</div>';
      html += '<div class="stop-desc">' + stop.note + '</div>';
      if (stop.tip) {
        html += '<div class="stop-tip">' + stop.tip + '</div>';
      }
      html += '</div>';

      if (travel) {
        html += '<div class="travel-info">';
        html += '<span class="travel-icon">' + travel.icon + '</span>';
        html += '<span>' + travel.method + '</span>';
        html += '</div>';
      }
    });
    html += '</div>';
  }

  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

function selectDay(dayIndex) {
  document.querySelectorAll('.day-tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.day-tab')[dayIndex].classList.add('active');
  showDay(dayIndex);
  renderDay(dayIndex);
  window.scrollTo(0, 0);
}

document.querySelectorAll('.day-tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    selectDay(parseInt(tab.dataset.day));
  });
});

showDay(0);
renderDay(0);
</script>
