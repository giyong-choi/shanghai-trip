<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f1a; color: #e0e0e0; overflow-x: hidden; }
  .header { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 14px 20px; text-align: center; border-bottom: 1px solid #2a2a4a; position: sticky; top: 0; z-index: 1000; }
  .header h1 { font-size: 18px; color: #fff; letter-spacing: 1px; }
  .header .dates { font-size: 11px; color: #888; margin-top: 3px; }

  .mode-selector { display: flex; gap: 6px; padding: 10px 12px; background: #12121f; border-bottom: 1px solid #2a2a4a; flex-wrap: wrap; position: sticky; top: 58px; z-index: 999; }
  .mode-btn { flex: 1; min-width: 70px; padding: 8px 4px; font-size: 11px; border: 1px solid #333; border-radius: 8px; background: #1a1a2e; color: #888; cursor: pointer; text-align: center; line-height: 1.3; transition: all 0.2s; }
  .mode-btn.active { border-color: #64b5f6; color: #64b5f6; background: rgba(100,181,246,0.1); }
  .mode-btn .mode-icon { font-size: 16px; display: block; margin-bottom: 2px; }

  .day-tabs { display: flex; overflow-x: auto; background: #1a1a2e; border-bottom: 1px solid #2a2a4a; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .day-tabs::-webkit-scrollbar { display: none; }
  .day-tab { flex: 0 0 auto; padding: 10px 16px; font-size: 13px; color: #888; border: none; background: none; cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent; transition: all 0.2s; }
  .day-tab.active { color: #64b5f6; border-bottom-color: #64b5f6; }
  .day-tab .tab-date { display: block; font-size: 10px; color: #666; margin-top: 2px; }

  #map { width: 100%; height: 38vh; min-height: 220px; }

  .schedule-container { padding: 14px; }
  .day-title { font-size: 15px; font-weight: 700; color: #64b5f6; margin-bottom: 3px; }
  .day-subtitle { font-size: 12px; color: #666; margin-bottom: 14px; }

  .timeline { position: relative; padding-left: 28px; }
  .timeline::before { content: ''; position: absolute; left: 10px; top: 8px; bottom: 8px; width: 2px; background: #2a2a4a; }

  .stop { position: relative; margin-bottom: 12px; background: #1a1a2e; border-radius: 10px; padding: 11px 13px; border: 1px solid #2a2a4a; }
  .stop::before { content: attr(data-num); position: absolute; left: -28px; top: 11px; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; z-index: 1; color: #0f0f1a; }
  .stop.hotel::before { background: #ff8a65; }
  .stop.food::before { background: #81c784; }
  .stop.attraction::before { background: #64b5f6; }
  .stop.transport::before { background: #ba68c8; }
  .stop.cruise::before { background: #4dd0e1; }
  .stop.rest::before { background: #ffd54f; }

  .stop-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 3px; }
  .stop-name { font-size: 13px; font-weight: 600; color: #fff; }
  .stop-name .cn-name { font-size: 10px; color: #888; font-weight: 400; margin-left: 5px; }
  .stop-time { font-size: 11px; color: #64b5f6; white-space: nowrap; margin-left: 6px; }
  .stop-desc { font-size: 12px; color: #aaa; line-height: 1.4; }
  .stop-tip { margin-top: 5px; font-size: 11px; color: #ffd54f; background: rgba(255,213,79,0.08); padding: 4px 8px; border-radius: 5px; }
  .stop-badge { display: inline-block; font-size: 9px; padding: 1px 5px; border-radius: 4px; margin-left: 4px; }
  .badge-skip { background: rgba(255,82,82,0.15); color: #ff5252; }
  .badge-alt { background: rgba(255,213,79,0.15); color: #ffd54f; }
  .badge-add { background: rgba(100,181,246,0.15); color: #64b5f6; }

  .travel-info { display: flex; align-items: center; gap: 8px; padding: 3px 0; margin-bottom: 6px; font-size: 11px; color: #555; }

  .hotel-summary { margin: 0 0 12px; padding: 10px 12px; background: linear-gradient(135deg, #2a1a1a, #1a1a2e); border-radius: 10px; border: 1px solid #3a2a2a; }
  .hotel-summary h3 { font-size: 12px; color: #ff8a65; margin-bottom: 3px; }
  .hotel-summary p { font-size: 12px; color: #ccc; line-height: 1.5; }

  .custom-marker { background: none; border: none; }
  .marker-pin { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 11px; font-weight: 700; box-shadow: 0 2px 6px rgba(0,0,0,0.4); border: 2px solid #fff; }

  .prep-section { margin: 14px; padding: 12px; background: #1a1a2e; border-radius: 10px; border: 1px solid #2a2a4a; }
  .prep-section h3 { font-size: 13px; color: #64b5f6; margin-bottom: 8px; }
  .prep-item { font-size: 12px; color: #aaa; line-height: 1.8; }
</style>
</head>

// ===== MAP =====
var map = L.map('map', { zoomControl: false, attributionControl: false }).setView([31.20, 121.50], 11);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 18 }).addTo(map);
L.control.zoom({ position: 'topright' }).addTo(map);

var typeColors = { hotel:'#ff8a65', attraction:'#64b5f6', food:'#81c784', transport:'#ba68c8', cruise:'#4dd0e1', rest:'#ffd54f' };
var markers = [], lines = [];

function clearMap() { markers.forEach(function(m){map.removeLayer(m)}); lines.forEach(function(l){map.removeLayer(l)}); markers=[]; lines=[]; }

function showMap(day) {
  clearMap();
  var stops = getStops(day, currentMode);
  var bounds = [];
  var seen = {};
  var num = 0;
  stops.forEach(function(s) {
    if (!s.p || seen[s.p]) return;
    seen[s.p] = true;
    var pl = P[s.p];
    if (!pl) return;
    num++;
    var color = typeColors[pl.t] || '#64b5f6';
    var icon = L.divIcon({ className:'custom-marker', html:'<div class="marker-pin" style="background:'+color+'">'+num+'</div>', iconSize:[26,26], iconAnchor:[13,13] });
    var m = L.marker([pl.lat, pl.lng], {icon:icon}).addTo(map);
    m.bindPopup('<b>'+pl.n+'</b><br><small>'+pl.c+'</small>');
    markers.push(m);
    bounds.push([pl.lat, pl.lng]);
  });
  if (bounds.length > 1) {
    var coords = [];
    Object.keys(seen).forEach(function(k){ var pl=P[k]; if(pl) coords.push([pl.lat,pl.lng]); });
    var line = L.polyline(coords, {color:'#64b5f6',weight:2,opacity:0.4,dashArray:'6,8'}).addTo(map);
    lines.push(line);
  }
  if (bounds.length > 0) map.fitBounds(bounds, {padding:[30,30], maxZoom:14});
}

function render(day) {
  var info = DAYS[day];
  var stops = getStops(day, currentMode);
  var modeLabel = currentMode === 'full-sun' ? '풀코스+맑음' : currentMode === 'full-rain' ? '풀코스+비' : currentMode === 'lite-sun' ? '라이트+맑음' : '라이트+비';

  var html = '<div class="schedule-container">';
  html += '<div class="day-title">' + info.title + '</div>';
  html += '<div class="day-subtitle">' + info.subtitle + ' | ' + modeLabel + '</div>';

  if (day === 0) {
    html += '<div class="prep-section"><h3>Must-Do Before Trip</h3>';
    stops.forEach(function(s) {
      html += '<div class="prep-item">' + (s.type==='transport'?'&#128736; ':'&#127860; ') + '<b>' + s.n + '</b> - ' + s.d + '</div>';
    });
    html += '</div>';
  } else {
    html += '<div class="timeline">';
    stops.forEach(function(s, i) {
      html += '<div class="stop ' + s.type + '" data-num="' + (i+1) + '">';
      html += '<div class="stop-header"><div class="stop-name">' + s.n;
      if (s.dur) html += ' <span class="cn-name">(' + s.dur + ')</span>';
      html += '</div><div class="stop-time">' + s.t + '</div></div>';
      html += '<div class="stop-desc">' + s.d + '</div>';
      if (s.tip) html += '<div class="stop-tip">' + s.tip + '</div>';
      html += '</div>';
    });
    html += '</div>';
  }
  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

function selectDay(d) {
  currentDay = d;
  document.querySelectorAll('.day-tab').forEach(function(t){t.classList.remove('active')});
  document.querySelectorAll('.day-tab')[d].classList.add('active');
  showMap(d);
  render(d);
}

document.querySelectorAll('.day-tab').forEach(function(tab) {
  tab.addEventListener('click', function() { selectDay(parseInt(tab.dataset.day)); });
});

document.querySelectorAll('.mode-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    currentMode = btn.dataset.mode;
    document.querySelectorAll('.mode-btn').forEach(function(b){b.classList.remove('active')});
    btn.classList.add('active');
    showMap(currentDay);
    render(currentDay);
  });
});

selectDay(0);
</script>
